<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>USTEC M1 – Lightweight Charts</title>
    <style>
      :root {
        --ui-scale: 2.0;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #131722;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #chart {
        width: 100vw;
        height: 100vh;
      }
      #overlay-ui {
        font-size: 28px;
      }
      #overlay-ui button,
      #overlay-ui select,
      #overlay-ui input,
      #overlay-ui label {
        font-size: 26px;
      }
    </style>
  </head>
  <body>
    <div
      id="overlay-ui"
      style="
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 10;
        color: #d1d4dc;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        user-select: none;
        pointer-events: none;
      "
    >
      <div style="pointer-events: auto;">
        <label>
          Timeframe:
          <select
            id="timeframe"
            style="
              margin-left: 8px;
              background: #0f1520;
              color: #d1d4dc;
              border: 1px solid #2a3551;
              border-radius: 6px;
              padding: calc(6px * var(--ui-scale)) calc(10px * var(--ui-scale));
            "
          >
            <option value="60">1m</option>
            <option value="300" selected>5m</option>
            <option value="900">15m</option>
            <option value="1800">30m</option>
            <option value="3600">1H</option>
            <option value="86400">1D</option>
          </select>
        </label>
        <button
          id="replay-mode-toggle"
          style="
            margin-left: 10px;
            background: #0f1520;
            color: #d1d4dc;
            border: 1px solid #2a3551;
            border-radius: 6px;
            padding: calc(6px * var(--ui-scale)) calc(10px * var(--ui-scale));
            cursor: pointer;
          "
        >
          Enter Replay
        </button>
      </div>

      <div
        id="replay-controls"
        style="
          margin-top: 8px;
          display: flex;
          align-items: center;
          gap: 8px;
          pointer-events: auto;
        "
      >
        <button
          id="replay-play"
          style="
            background: #0f1520;
            color: #d1d4dc;
            border: 1px solid #2a3551;
            border-radius: 6px;
            padding: calc(4px * var(--ui-scale)) calc(10px * var(--ui-scale));
            cursor: pointer;
          "
        >
          Play
        </button>
        <button
          id="replay-step"
          style="
            background: #0f1520;
            color: #d1d4dc;
            border: 1px solid #2a3551;
            border-radius: 6px;
            padding: calc(4px * var(--ui-scale)) calc(10px * var(--ui-scale));
            cursor: pointer;
          "
        >
          Step
        </button>
        <label>
          Speed:
          <select
            id="replay-speed"
            style="
              margin-left: 6px;
              background: #0f1520;
              color: #d1d4dc;
              border: 1px solid #2a3551;
              border-radius: 6px;
              padding: calc(4px * var(--ui-scale)) calc(8px * var(--ui-scale));
            "
          >
            <option value="1">1x</option>
            <option value="2">2x</option>
            <option value="5" selected>5x</option>
            <option value="10">10x</option>
          </select>
        </label>
      </div>
      <div style="margin-top: 6px; pointer-events: auto;">
        <input
          id="replay-position"
          type="range"
          min="0"
          max="1000"
          value="0"
          style="width: calc(280px * var(--ui-scale));"
        />
      </div>
      <div style="margin-top: 6px; pointer-events: auto; display: flex; align-items: center; gap: 8px;">
        <label for="replay-jump-datetime">Jump time (UTC):</label>
        <input
          id="replay-jump-datetime"
          type="text"
          inputmode="numeric"
          placeholder="DD/MM/YYYY HH:mm"
          style="
            background: #0f1520;
            color: #d1d4dc;
            border: 1px solid #2a3551;
            border-radius: 6px;
            padding: calc(4px * var(--ui-scale)) calc(8px * var(--ui-scale));
            width: calc(170px * var(--ui-scale));
          "
        />
      </div>

      <div id="indicators-menu" style="margin-top: 8px; pointer-events: auto;"></div>
    </div>
    <div id="chart"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
